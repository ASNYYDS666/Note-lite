version: '3.8'

services:
  # ========== 基础设施 ==========
  mysql:
    image: mysql:8
    container_name: note-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: note_db
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: note-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== RAG 向量数据库 ==========
  qdrant:
    image: qdrant/qdrant:latest
    container_name: note-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ========== 本地 Embedding 向量化 ==========
  embedding:
    image: michaelf34/infinity:latest
    container_name: note-embedding
    ports:
      - "8081:7997"
    command:
      - --model-id
      - BAAI/bge-small-zh-v1.5
      - --port
      - "7997"
    volumes:
      - embedding-cache:/app/.cache
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7997/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== 监控 ==========
  prometheus:
    image: prom/prometheus:latest
    container_name: note-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: note-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
  embedding-cache: