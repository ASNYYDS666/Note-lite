services:
  # ========== 基础设施 ==========
  mysql:
    image: mysql:8
    container_name: note-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: note_db
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: note-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: note-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ========== 后端服务 ==========
  backend:
    build: ./note-service
    container_name: note-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/note_db?createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-1234}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AI_AES_KEY=${AI_AES_KEY:-change-me-in-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    dns:
      - 127.0.0.11
    restart: unless-stopped

  # ========== 前端服务 ==========
  frontend:
    build: ./note-ui
    container_name: note-frontend
    ports:
      - "3100:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ========== 本地 Embedding（可选） ==========
  embedding:
    build: ./embedding
    container_name: note-embedding
    profiles:
      - embedding
    ports:
      - "8081:8081"
    environment:
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - embedding-cache:/root/.cache
    restart: unless-stopped

  # ========== 监控（可选） ==========
  prometheus:
    image: prom/prometheus:latest
    container_name: note-prometheus
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: note-grafana
    profiles:
      - monitoring
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  qdrant-data:
  embedding-cache:
  prometheus-data:
  grafana-data:
