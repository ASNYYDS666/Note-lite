# ========== 开发环境配置 ==========
server:
  tomcat:
    mbeanregistry:
      enabled: true  # 暴露 tomcat_threads_busy_threads 等指标给 Prometheus

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/note_db?createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 5000
      # 并发测试：启用 HikariCP Micrometer 指标暴露
      metrics:
        enabled: true
    pool-name: NoteHikariCP

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2
          max-wait: 500ms

jwt:
  secret: ${JWT_SECRET:dev-secret-key-note-lite-local-only}

# RAG 开发环境配置
qdrant:
  host: localhost
  port: 16333
  collection: note_chunks
  vector-size: 512

ai:
  aes-key: ${AES_KEY:note-lite-devkey}

logging:
  level:
    com.note.service: DEBUG
    com.note.service.mapper: DEBUG
