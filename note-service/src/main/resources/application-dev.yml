# ========== 开发环境配置 ==========
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/note_db?createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 5000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2
          max-wait: 500ms

jwt:
  secret: dev-secret-key-note-lite-local-only

# RAG 开发环境配置
qdrant:
  host: localhost
  port: 16333
  collection: note_chunks
  vector-size: 1536

ai:
  aes-key: note-lite-devkey

logging:
  level:
    com.note.service: DEBUG
    com.note.service.mapper: DEBUG
