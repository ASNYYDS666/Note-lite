# ========== 生产环境配置 ==========
server:
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      metrics:
        enabled: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

jwt:
  secret: ${JWT_SECRET}

# RAG 生产环境配置
qdrant:
  host: ${QDRANT_HOST}
  port: ${QDRANT_PORT:6333}
  collection: note_chunks
  vector-size: 512

ai:
  aes-key: ${AI_AES_KEY}

logging:
  level:
    com.note.service: INFO
    com.note.service.mapper: WARN
    root: WARN
