# ========== 公共配置（所有 profile 共享） ==========
spring:
  profiles:
    active: dev  # 本地默认 dev，Docker 部署时用环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true

mybatis-plus:

jwt:
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: note-service
