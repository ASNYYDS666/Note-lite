spring:
  datasource:
    url: jdbc:mysql://localhost:3306/note_db?createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      # password:      # 无密码留空
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 100ms

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 控制台打印 SQL

jwt:
  secret: your-secret-key-note-lite-2024-very-long-key-at-least-32-bytes-ok
  expiration: 86400000  # 24小时，单位毫秒

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: note-service  # 全局标签，会添加到所有指标中



